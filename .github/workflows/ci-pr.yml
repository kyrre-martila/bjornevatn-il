name: CI - PR (manual)

on:
  # Re-enable later by uncommenting:
  # pull_request:
  #   types: [opened, synchronize, reopened, ready_for_review]
  #   paths:
  #     - "apps/**"
  #     - "packages/**"
  #     - "pnpm-lock.yaml"
  #     - ".github/workflows/**"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Kjør "Tools" først (lint, typecheck, unit, prettier, ev. dart format)
  tools:
    uses: ./.github/workflows/tools.yml

  # E2E for web – kjører KUN når du manuelt starter workflowen
  e2e_web:
    name: E2E (web)
    needs: tools
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps

      - name: Run dev and wait
        working-directory: apps/web
        env:
          CI: true
          # Sett NEXT_TELEMETRY_DISABLED dersom Next.js spyr logging:
          # NEXT_TELEMETRY_DISABLED: "1"
        run: |
          pnpm dev & DEV_PID=$!
          npx wait-on http://localhost:3000
          pnpm test:e2e --reporter=line
          kill $DEV_PID || true
