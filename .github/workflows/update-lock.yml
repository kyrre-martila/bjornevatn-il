name: Update Lockfile and ESLint Deps
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Install dependencies
        run: pnpm install

      - name: Add ESLint flat-config dependencies
        run: pnpm add -Dw @eslint/js@^9.9.0 typescript-eslint@^8.8.0

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add package.json pnpm-lock.yaml
          git commit -m "chore: update ESLint devDependencies and lockfile"
          git push
