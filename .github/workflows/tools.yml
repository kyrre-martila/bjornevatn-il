name: Manual Quality Checks

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: tools-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  setup:
    name: Setup monorepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

  openapi-contract-sync:
    name: OpenAPI contract drift check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify OpenAPI generation + drift
        run: pnpm check:openapi:drift

  lint:
    name: Lint (ESLint)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run lint

  typecheck:
    name: Typecheck (TS)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          pnpm --filter @org/domain build
          pnpm --filter @org/domain-adapters-prisma build
          pnpm --filter api exec tsc --noEmit -p tsconfig.json
          pnpm --filter web exec tsc --noEmit -p tsconfig.json

  unit:
    name: Unit tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Test (unit)
        run: pnpm run test:unit -- --ci --reporter=default

  prettier:
    name: Prettier check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: npx prettier --check .
