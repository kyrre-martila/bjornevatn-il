name: Tools

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/tools.yml"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: tools-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  setup:
    name: Setup monorepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

  openapi-contract-sync:
    name: OpenAPI contract drift check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI
        run: pnpm generate:openapi

      - name: Validate OpenAPI contract invariants
        run: node packages/contracts/scripts/validate-openapi.mjs

      - name: Verify OpenAPI is up to date
        run: git diff --exit-code -- packages/contracts/openapi.v1.json

  lint:
    name: Lint (ESLint)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run lint

  typecheck:
    name: Typecheck (TS)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

  unit:
    name: Unit tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Test (unit)
        run: pnpm -r run test:unit -- --ci --reporter=default

  prettier:
    name: Prettier check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: |
          if pnpm -s -w exec -- which prettier >/dev/null 2>&1; then
            pnpm -r run prettier:check || npx prettier --check .
          else
            npx prettier --check .
          fi
