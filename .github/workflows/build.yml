name: Build (manual)

on:
  workflow_call:
  # Uncomment later if you want it to build automatically:
  # push:
  #   branches: [ main ]
  #   paths:
  #     - "apps/**"
  #     - "packages/**"
  #     - "pnpm-lock.yaml"
  #     - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tools-gate:
    name: Run tools first
    uses: ./.github/workflows/tools.yml

  build-web:
    name: Build Web
    needs: tools-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: apps/web
        run: pnpm build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/.next/**

  build-api:
    name: Build API
    needs: tools-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # 🔑 Generer Prisma Client i adapter-pakken mot API-skjemaet
      - name: Generate Prisma Client for domain-adapters-prisma
        run: |
          if [ -f apps/api/prisma/schema.prisma ]; then
            pnpm --filter @org/domain-adapters-prisma exec prisma generate --schema ../../apps/api/prisma/schema.prisma
          fi

      # (Valgfritt) Generer også for API-prosjektet om det bruker @prisma/client direkte
      - name: Generate Prisma Client for API (optional)
        run: |
          if [ -f apps/api/prisma/schema.prisma ]; then
            pnpm --filter ./apps/api exec prisma generate --schema prisma/schema.prisma
          fi

      # Bygg API og last opp logg ved feil
      - name: Build api
        id: build_api
        working-directory: apps/api
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee ../../api-build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload API build log (on failure)
        if: steps.build_api.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: api-build-log
          path: api-build.log
          if-no-files-found: ignore

      - name: Upload api artifact (on success)
        if: steps.build_api.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/**

  build-mobile:
    name: Build Mobile (Flutter)
    needs: tools-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: "stable"

      - name: Install Flutter deps
        working-directory: apps/mobile
        run: flutter pub get

      - name: Validate Android Gradle wrapper
        working-directory: apps/mobile
        run: |
          flutter clean
          flutter pub get
          flutter create . --platforms=android --overwrite
          flutter pub get

      - name: Build release APK
        working-directory: apps/mobile
        run: flutter build apk --release

      - name: Upload Mobile Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: apps/mobile/build/app/outputs/flutter-apk/*.apk

  docker-push:
    name: Build & Push Docker (optional)
    if: ${{ vars.ENABLE_DOCKER_PUSH == 'true' }}
    needs: [build-web, build-api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
