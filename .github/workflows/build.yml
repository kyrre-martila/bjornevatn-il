name: Build (manual)

on:
  workflow_call:
  # Uncomment later if you want it to build automatically:
  # push:
  #   branches: [ main ]
  #   paths:
  #     - "apps/**"
  #     - "packages/**"
  #     - "pnpm-lock.yaml"
  #     - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tools-gate:
    name: Run tools first
    uses: ./.github/workflows/tools.yml

  build-web:
    name: Build Web
    needs: tools-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: apps/web
        run: pnpm build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/.next/**

  build-api:
    name: Build API
    needs: tools-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Verify pnpm
        run: pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # --- Prisma generate i adapter-pakken ---
      # 1) Kopiér API-skjema til adapter, så generering skjer i adapterens kontekst
      - name: Copy Prisma schema into adapter package
        run: |
          mkdir -p packages/domain-adapters-prisma/prisma
          cp packages/db/prisma/schema.prisma packages/domain-adapters-prisma/prisma/schema.prisma

      # 2) Kjør prisma generate via npx mot adapterens schema
      - name: Generate Prisma Client in adapter (using API schema)
        working-directory: packages/domain-adapters-prisma
        run: npx prisma generate --schema prisma/schema.prisma

      # (Valgfritt) generer også i API-prosjektet dersom API bruker @prisma/client direkte
      - name: Generate Prisma Client in API (optional)
        working-directory: apps/api
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma generate --schema prisma/schema.prisma
          fi

      # Build API og last opp logg ved feil
      - name: Build api
        id: build_api
        working-directory: apps/api
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee ../../api-build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload API build log (on failure)
        if: steps.build_api.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: api-build-log
          path: api-build.log
          if-no-files-found: ignore

      - name: Upload api artifact (on success)
        if: steps.build_api.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/**

  docker-push:
    name: Build & Push Docker (optional)
    if: ${{ vars.ENABLE_DOCKER_PUSH == 'true' }}
    needs: [build-web, build-api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
