services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    env_file:
      - ./.env.server
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  migrate:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
      target: migrate
    image: bjornevatn-il-api-migrate:prod
    profiles: ["ops"]
    restart: "no"
    env_file:
      - ./.env.server
    environment:
      NODE_ENV: production
      DEPLOY_ENV: ${DEPLOY_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
      target: runtime
    image: bjornevatn-il-api:prod
    restart: unless-stopped
    env_file:
      - ./.env.server
    environment:
      NODE_ENV: production
      DEPLOY_ENV: ${DEPLOY_ENV:-production}
      PORT: 4000
      APP_URL: ${APP_URL}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS}
      MEDIA_STORAGE_PROVIDER: ${MEDIA_STORAGE_PROVIDER:-local}
      METRICS_ALLOWLIST: ${METRICS_ALLOWLIST:-127.0.0.1/32,::1/128}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PUBLIC_SUBMISSION_CHALLENGE_TOKEN: ${PUBLIC_SUBMISSION_CHALLENGE_TOKEN:-}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      NEXT_PUBLIC_REGISTRATION_ENABLED: ${NEXT_PUBLIC_REGISTRATION_ENABLED:-false}
      TICKET_ORDER_LOOKUP_TOKEN_TTL_MS: ${TICKET_ORDER_LOOKUP_TOKEN_TTL_MS:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-bjornevatn-il-api}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-production}
      LIVE_UPLOADS_PATH: ${LIVE_UPLOADS_PATH:-}
      STAGING_UPLOADS_PATH: ${STAGING_UPLOADS_PATH:-}
      STAGING_SYNC_SCRIPT_PATH: ${STAGING_SYNC_SCRIPT_PATH:-}
    volumes:
      - ../data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api/v1}
        INTERNAL_API_URL: http://127.0.0.1:4010
    image: bjornevatn-il-web:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEPLOY_ENV: ${DEPLOY_ENV:-production}
      PORT: 3000
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api/v1}
      NEXT_PUBLIC_CSP_MEDIA_ORIGINS: ${NEXT_PUBLIC_CSP_MEDIA_ORIGINS:-}
      NEXT_PUBLIC_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_CSRF_COOKIE_NAME:-XSRF-TOKEN}
      NEXT_PUBLIC_REGISTRATION_ENABLED: ${NEXT_PUBLIC_REGISTRATION_ENABLED:-false}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:4000}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://$${HOSTNAME}:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:
    driver: bridge
